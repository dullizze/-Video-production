services:
  shorts:
    build: .
    image: shorts-pipeline
    env_file: .env          # API 키 등 (레포에 없음, PC마다 .env.example 복사해 작성)
    volumes:
      - ./runs:/app/runs    # 산출물(final.mp4 등)을 호스트 폴더로 노출

  api:
    build: .
    image: shorts-pipeline
    env_file: .env
    entrypoint: ["uvicorn", "pipeline.api:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    volumes:
      - ./runs:/app/runs
